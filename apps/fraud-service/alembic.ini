# Alembic config — the connection string is NOT here: env.py reads
# MIGRATION_DATABASE_URL from the environment (fraud_migrator role,
# postgresql+psycopg2:// — Alembic's runner is sync-only, hence the second
# driver; see Section 6's "Why two Postgres drivers" note).
[alembic]
script_location = alembic
# env.py imports app.models.db — the alembic CLI doesn't put the cwd on
# sys.path by itself, so `from app...` fails without this.
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
